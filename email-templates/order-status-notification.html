<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de tu pedido - Tropicolors</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        table {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        .email-wrapper {
            width: 100%;
            background-color: #f5f5f5;
            padding: 30px 0;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .email-header {
            background: linear-gradient(135deg, #003F91 0%, #0056b3 100%);
            padding: 25px 20px;
            text-align: center;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .email-content {
            padding: 35px 25px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #003F91;
            margin: 0 0 15px 0;
            text-align: center;
        }
        .subtitle {
            font-size: 16px;
            color: #666666;
            text-align: center;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .status-pending {
            background-color: #fef3c7;
            color: #92400e;
        }
        .status-paid {
            background-color: #dbeafe;
            color: #1e40af;
        }
        .status-sent {
            background-color: #e0e7ff;
            color: #3730a3;
        }
        .status-delivered {
            background-color: #dcfce7;
            color: #166534;
        }
        .status-failed {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .info-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .info-detail {
            font-size: 14px;
            color: #333333;
            margin: 8px 0;
        }
        .info-label {
            font-weight: 600;
            color: #666666;
        }
        .tracking-box {
            background-color: #eff6ff;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .tracking-title {
            font-size: 16px;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 10px;
        }
        .tracking-number {
            font-size: 18px;
            font-weight: bold;
            color: #003F91;
            letter-spacing: 1px;
        }
        .tracking-company {
            font-size: 14px;
            color: #666666;
            margin-top: 5px;
        }
        .status-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .cta-button {
            display: inline-block;
            background-color: #1E5EFF;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            margin: 20px 0;
        }
        .email-footer {
            background-color: #1a1a1a;
            padding: 25px 20px;
            text-align: center;
        }
        .footer-text {
            font-size: 12px;
            color: #999999;
            margin: 5px 0;
        }
        .footer-link {
            color: #00A8B5;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            .email-wrapper { background-color: #1a1a1a; }
            .email-container { background-color: #2d2d2d; }
            .info-box { background-color: #3a3a3a; }
            .info-detail { color: #dddddd; }
            .tracking-box { background-color: #1e3a5f; border-color: #3b82f6; }
            .tracking-title { color: #93c5fd; }
            .tracking-number { color: #60a5fa; }
            .tracking-company { color: #aaaaaa; }
            .email-footer { background-color: #0d0d0d; }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="email-header">
                <span class="logo-text">TROPICOLORS</span>
            </div>
            
            <div class="email-content" id="content">
                <!-- El contenido se genera dinámicamente según el estado -->
                {{STATUS_CONTENT}}
            </div>
            
            <div class="email-footer">
                <p class="footer-text" style="font-size: 14px; color: #ffffff; font-weight: 600;">Tropicolors</p>
                <p class="footer-text">Colorantes Artificiales de Alta Concentración</p>
                <p class="footer-text">
                    <a href="https://tropicolors.mx" class="footer-link">tropicolors.mx</a>
                </p>
                <p class="footer-text" style="margin-top: 15px;">
                    © {{CURRENT_YEAR}} Tropicolors. Todos los derechos reservados.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
